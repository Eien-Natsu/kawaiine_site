<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Kawaiine( •̀ ω •́ )✧ - a pink glitch art shader website."
    />
    <title>Kawaiine( •̀ ω •́ )✧</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Noto+Sans+SC:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="site-header">
      <span class="brand">Kawaiine</span>
      <span class="page-counter" data-page-counter>01 / 05</span>
    </header>

    <main class="fullscreen-gallery" data-gallery>
      <section class="gallery-page hero is-active" data-page="kawaiine" aria-labelledby="hero-title">
        <canvas class="page-canvas artwork-canvas" data-piece="kawaiine" aria-hidden="true"></canvas>
        <div class="hero-copy">
          <p class="signal-label">ELECTRONIC GALLERY / STIMULUS MODE</p>
          <h1 id="hero-title" class="glitch-title" data-text="Kawaiine">
            <span class="title-word">Kawaiine</span><span id="kaomoji">( •̀ ω •́ )✧</span>
          </h1>
          <p class="hero-subtitle">
            Four isolated shader works for jewel pressure, solar overexposure,
            absolute black, and chromatic overload.
          </p>
        </div>
      </section>

      <section class="gallery-page" data-page="gem" aria-label="宝石">
        <canvas class="page-canvas artwork-canvas" data-piece="gem" aria-hidden="true"></canvas>
      </section>

      <section class="gallery-page" data-page="sun" aria-label="太阳">
        <canvas class="page-canvas artwork-canvas" data-piece="sun" aria-hidden="true"></canvas>
      </section>

      <section class="gallery-page" data-page="void" aria-label="黑色">
        <canvas class="page-canvas artwork-canvas" data-piece="void" aria-hidden="true"></canvas>
      </section>

      <section class="gallery-page" data-page="rainbow" aria-label="彩虹">
        <canvas class="page-canvas artwork-canvas" data-piece="rainbow" aria-hidden="true"></canvas>
      </section>
    </main>

    <script src="js/shader-common.js"></script>
    <script src="js/effects/scanlines.js"></script>
    <script src="js/artworks/kawaiine.js"></script>
    <script src="js/artworks/gem.js"></script>
    <script src="js/artworks/sun.js"></script>
    <script src="js/artworks/void.js"></script>
    <script src="js/artworks/rainbow.js"></script>
    <script src="script.js"></script>
  </body>
</html>
